server:
  port: 8080

spring:
  application:
    name: ai-oncall-agent
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/oncall_agent}
    username: ${DATABASE_USERNAME:oncall}
    password: ${DATABASE_PASSWORD:oncall}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4.1-mini}
          temperature: 0.2
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      pgvector:
        initialize-schema: false
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        index-type: HNSW
        table-name: vector_store

app:
  demo-mode: ${DEMO_MODE:false}
  classroom-llm:
    enabled: ${CLASSROOM_LLM_ENABLED:false}
    endpoint: ${CLASSROOM_LLM_ENDPOINT:https://4dm65e698a.execute-api.us-west-2.amazonaws.com/prod/invoke}
    api-key: ${CLASSROOM_LLM_API_KEY:${OPENAI_API_KEY:}}
    model: ${CLASSROOM_LLM_MODEL:claude-sonnet-4.5}
    max-tokens: ${CLASSROOM_LLM_MAX_TOKENS:768}
  retrieval:
    top-k: ${RETRIEVAL_TOP_K:8}
    candidate-k: ${RETRIEVAL_CANDIDATE_K:24}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  operations:
    sync-enabled: ${OPERATIONS_SYNC_ENABLED:true}
    fixed-delay-ms: ${OPERATIONS_SYNC_FIXED_DELAY_MS:60000}
    logs-lookback-minutes: ${OPERATIONS_LOGS_LOOKBACK_MINUTES:15}
    prometheus:
      enabled: ${PROMETHEUS_ENABLED:false}
      base-url: ${PROMETHEUS_BASE_URL:http://localhost:9090}
      alerts-path: ${PROMETHEUS_ALERTS_PATH:/api/v1/alerts}
    mcp-logs:
      enabled: ${MCP_LOGS_ENABLED:false}
      endpoint: ${MCP_LOGS_ENDPOINT:http://localhost:8081/mcp/logs/query}
      auth-header: ${MCP_LOGS_AUTH_HEADER:}
      auth-token: ${MCP_LOGS_AUTH_TOKEN:}
      query: ${MCP_LOGS_QUERY:error OR exception OR timeout OR failed}
      limit: ${MCP_LOGS_LIMIT:200}
      request-template: ${MCP_LOGS_REQUEST_TEMPLATE:__DEFAULT__}
      response:
        logs-path: ${MCP_LOGS_RESPONSE_LOGS_PATH:logs}
        timestamp-fields: ${MCP_LOGS_RESPONSE_TIMESTAMP_FIELDS:timestamp,time,ts}
        service-fields: ${MCP_LOGS_RESPONSE_SERVICE_FIELDS:service,app,source}
        level-fields: ${MCP_LOGS_RESPONSE_LEVEL_FIELDS:level,severity}
        message-fields: ${MCP_LOGS_RESPONSE_MESSAGE_FIELDS:message,msg,line}
        attributes-path: ${MCP_LOGS_RESPONSE_ATTRIBUTES_PATH:attributes}
