services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-oncall-postgres
    environment:
      POSTGRES_DB: oncall_agent
      POSTGRES_USER: oncall
      POSTGRES_PASSWORD: oncall
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oncall -d oncall_agent"]
      interval: 5s
      timeout: 5s
      retries: 20

  mock-ops:
    image: python:3.12-alpine
    container_name: ai-oncall-mock-ops
    working_dir: /app
    command: python mock_ops_server.py
    volumes:
      - ./mock-ops:/app:ro
    ports:
      - "9090:9090"
      - "8081:8081"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-oncall-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/oncall_agent
      DATABASE_USERNAME: ${DATABASE_USERNAME:-oncall}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-oncall}
      DEMO_MODE: ${DEMO_MODE:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4.1-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      CLASSROOM_LLM_ENABLED: ${CLASSROOM_LLM_ENABLED:-false}
      CLASSROOM_LLM_ENDPOINT: ${CLASSROOM_LLM_ENDPOINT:-https://4dm65e698a.execute-api.us-west-2.amazonaws.com/prod/invoke}
      CLASSROOM_LLM_API_KEY: ${CLASSROOM_LLM_API_KEY:-${OPENAI_API_KEY:-}}
      CLASSROOM_LLM_MODEL: ${CLASSROOM_LLM_MODEL:-claude-sonnet-4.5}
      CLASSROOM_LLM_MAX_TOKENS: ${CLASSROOM_LLM_MAX_TOKENS:-768}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost}
      OPERATIONS_SYNC_ENABLED: ${OPERATIONS_SYNC_ENABLED:-true}
      OPERATIONS_SYNC_FIXED_DELAY_MS: ${OPERATIONS_SYNC_FIXED_DELAY_MS:-60000}
      OPERATIONS_LOGS_LOOKBACK_MINUTES: ${OPERATIONS_LOGS_LOOKBACK_MINUTES:-15}
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-false}
      PROMETHEUS_BASE_URL: ${PROMETHEUS_BASE_URL:-http://prometheus:9090}
      PROMETHEUS_ALERTS_PATH: ${PROMETHEUS_ALERTS_PATH:-/api/v1/alerts}
      MCP_LOGS_ENABLED: ${MCP_LOGS_ENABLED:-false}
      MCP_LOGS_ENDPOINT: ${MCP_LOGS_ENDPOINT:-http://mcp-logs:8081/mcp/logs/query}
      MCP_LOGS_AUTH_HEADER: ${MCP_LOGS_AUTH_HEADER:-}
      MCP_LOGS_AUTH_TOKEN: ${MCP_LOGS_AUTH_TOKEN:-}
      MCP_LOGS_QUERY: ${MCP_LOGS_QUERY:-error OR exception OR timeout OR failed}
      MCP_LOGS_LIMIT: ${MCP_LOGS_LIMIT:-200}
      MCP_LOGS_REQUEST_TEMPLATE: ${MCP_LOGS_REQUEST_TEMPLATE:-__DEFAULT__}
      MCP_LOGS_RESPONSE_LOGS_PATH: ${MCP_LOGS_RESPONSE_LOGS_PATH:-logs}
      MCP_LOGS_RESPONSE_TIMESTAMP_FIELDS: ${MCP_LOGS_RESPONSE_TIMESTAMP_FIELDS:-timestamp,time,ts}
      MCP_LOGS_RESPONSE_SERVICE_FIELDS: ${MCP_LOGS_RESPONSE_SERVICE_FIELDS:-service,app,source}
      MCP_LOGS_RESPONSE_LEVEL_FIELDS: ${MCP_LOGS_RESPONSE_LEVEL_FIELDS:-level,severity}
      MCP_LOGS_RESPONSE_MESSAGE_FIELDS: ${MCP_LOGS_RESPONSE_MESSAGE_FIELDS:-message,msg,line}
      MCP_LOGS_RESPONSE_ATTRIBUTES_PATH: ${MCP_LOGS_RESPONSE_ATTRIBUTES_PATH:-attributes}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/documents >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ai-oncall-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:80"

volumes:
  postgres-data:
